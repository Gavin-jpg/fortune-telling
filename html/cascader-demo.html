<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>级联选择器演示</title>
    <!-- 引入中国行政区划数据 -->
    <script src="city-data.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1525 0%, #2d2540 50%, #403555 100%);
            color: #f0e6ff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(40, 30, 60, 0.95);
            border-radius: 24px;
            border: 1px solid rgba(156, 127, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: rgba(240, 230, 255, 0.8);
        }
        .td-cascader-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(156, 127, 255, 0.1);
            border: 1px solid rgba(156, 127, 255, 0.3);
            border-radius: 12px;
            color: #f0e6ff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }
        .td-cascader-input:hover {
            border-color: #9c7fff;
            background: rgba(156, 127, 255, 0.15);
        }
        .td-cascader-input:focus {
            border-color: #9c7fff;
            box-shadow: 0 0 20px rgba(156, 127, 255, 0.3);
        }
        .td-cascader-input::placeholder {
            color: rgba(240, 230, 255, 0.4);
        }
        .cascader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        .cascader-overlay.show {
            display: flex;
        }
        .cascader-panel {
            width: 100%;
            max-width: 600px;
            background: rgba(40, 30, 60, 0.98);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            border-top: 2px solid rgba(156, 127, 255, 0.5);
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        .cascader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(156, 127, 255, 0.2);
        }
        .cascader-header h3 {
            color: #f0e6ff;
            font-size: 1.2em;
            font-weight: 600;
        }
        .cascader-close {
            background: transparent;
            border: none;
            color: rgba(240, 230, 255, 0.6);
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.2s ease;
        }
        .cascader-close:hover {
            color: #f0e6ff;
        }
        .cascader-options {
            display: flex;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .cascader-column {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            background: rgba(156, 127, 255, 0.05);
            border-radius: 12px;
            overflow-y: auto;
        }
        .cascader-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            color: #f0e6ff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cascader-item:hover {
            background: rgba(156, 127, 255, 0.1);
        }
        .cascader-item.selected {
            background: rgba(156, 127, 255, 0.2);
            color: #9c7fff;
        }
        .cascader-confirm {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9c7fff 0%, #8b70ff 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .cascader-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(156, 127, 255, 0.4);
        }
        .selected-result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(156, 127, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(156, 127, 255, 0.2);
        }
        .selected-result h3 {
            color: #9c7fff;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .selected-result p {
            margin: 8px 0;
            font-size: 0.9em;
            color: rgba(240, 230, 255, 0.8);
        }
        .selected-result .address {
            font-size: 1.1em;
            font-weight: 600;
            color: #f0e6ff;
            margin-top: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        /* 滚动条样式 */
        .cascader-column::-webkit-scrollbar {
            width: 6px;
        }
        .cascader-column::-webkit-scrollbar-track {
            background: rgba(156, 127, 255, 0.1);
            border-radius: 3px;
        }
        .cascader-column::-webkit-scrollbar-thumb {
            background: rgba(156, 127, 255, 0.3);
            border-radius: 3px;
        }
        .cascader-column::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 127, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>级联选择器演示</h2>

        <div class="form-group">
            <label>选择出生地点</label>
            <input type="text" id="cityInput" class="td-cascader-input" placeholder="请选择省/市/区" readonly>
        </div>

        <div class="selected-result" id="resultSection" style="display: none;">
            <h3>已选择：</h3>
            <p>省份代码：<span id="provinceCode"></span></p>
            <p>城市代码：<span id="cityCode"></span></p>
            <p>区县代码：<span id="districtCode"></span></p>
            <p class="address">完整地址：<span id="fullAddress"></span></p>
        </div>
    </div>

    <script>
        let cityCascaderData = [];
        let cascaderOverlay = null;
        let selectedPath = {
            province: null,
            city: null,
            district: null
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            prepareCascaderData();
            createCascaderInput();
            createCascaderOverlay();
        });

        // 准备级联数据
        function prepareCascaderData() {
            if (typeof CITY_DATA !== 'undefined') {
                console.log('使用 city-data.js 完整数据');
                cityCascaderData = Object.keys(CITY_DATA).map(provinceName => {
                    const province = CITY_DATA[provinceName];
                    const cities = province.cities;
                    const cityChildren = [];

                    for (const cityName in cities) {
                        const districts = cities[cityName];
                        const districtChildren = districts.map(districtName => ({
                            label: districtName,
                            value: districtName
                        }));

                        cityChildren.push({
                            label: cityName,
                            value: cityName,
                            children: districtChildren
                        });
                    }

                    return {
                        label: provinceName,
                        value: provinceName,
                        children: cityChildren
                    };
                });
            } else {
                console.error('city-data.js 未加载，使用备用数据');
                // 备用模拟数据
                cityCascaderData = [
                    {
                        label: '北京市',
                        value: '110000',
                        children: [
                            {
                                label: '北京市',
                                value: '110100',
                                children: [
                                    { label: '东城区', value: '110101' },
                                    { label: '西城区', value: '110102' },
                                    { label: '朝阳区', value: '110105' }
                                ]
                            }
                        ]
                    }
                ];
            }
        }

        // 创建输入框
        function createCascaderInput() {
            const input = document.getElementById('cityInput');
            if (input) {
                input.addEventListener('click', () => {
                    if (cascaderOverlay) {
                        cascaderOverlay.classList.add('show');
                    }
                });
            }
        }

        // 创建级联选择器弹窗
        function createCascaderOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'cascader-overlay';
            overlay.id = 'cascaderOverlay';

            const panel = document.createElement('div');
            panel.className = 'cascader-panel';

            // 标题栏
            const header = document.createElement('div');
            header.className = 'cascader-header';

            const title = document.createElement('h3');
            title.textContent = '选择出生地点';

            const closeBtn = document.createElement('button');
            closeBtn.className = 'cascader-close';
            closeBtn.innerHTML = '✕';
            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('show');
            });

            header.appendChild(title);
            header.appendChild(closeBtn);

            // 选项容器
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'cascader-options';
            optionsContainer.id = 'cascaderOptions';

            // 确认按钮
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'cascader-confirm';
            confirmBtn.textContent = '确定';
            confirmBtn.addEventListener('click', confirmSelection);

            panel.appendChild(header);
            panel.appendChild(optionsContainer);
            panel.appendChild(confirmBtn);
            overlay.appendChild(panel);

            document.body.appendChild(overlay);
            cascaderOverlay = overlay;

            // 点击遮罩关闭
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });

            // 初始化第一级选项
            renderLevelOptions(0, cityCascaderData);
        }

        // 渲染级联选项
        function renderLevelOptions(level, data) {
            const container = document.getElementById('cascaderOptions');
            if (!container) return;

            // 清除当前级别之后的选项
            while (container.children.length > level + 1) {
                container.removeChild(container.lastChild);
            }

            // 检查当前级别是否已存在
            let levelContainer = container.children[level];
            if (!levelContainer) {
                levelContainer = document.createElement('div');
                levelContainer.className = 'cascader-column';
                container.appendChild(levelContainer);
            }

            levelContainer.innerHTML = '';

            data.forEach(item => {
                const option = document.createElement('div');
                option.className = 'cascader-item';
                option.textContent = item.label;
                option.dataset.level = level;
                option.dataset.value = item.value;
                option.dataset.label = item.label;

                option.addEventListener('click', () => {
                    // 移除同级其他选项的选中状态
                    Array.from(levelContainer.children).forEach(child => {
                        child.classList.remove('selected');
                    });

                    // 设置选中状态
                    option.classList.add('selected');

                    // 更新选中路径
                    if (level === 0) {
                        selectedPath.province = { value: item.value, label: item.label };
                        selectedPath.city = null;
                        selectedPath.district = null;
                    } else if (level === 1) {
                        selectedPath.city = { value: item.value, label: item.label };
                        selectedPath.district = null;
                    } else if (level === 2) {
                        selectedPath.district = { value: item.value, label: item.label };
                    }

                    // 如果有子级，渲染下一级
                    if (item.children && item.children.length > 0) {
                        renderLevelOptions(level + 1, item.children);
                    }
                });

                levelContainer.appendChild(option);
            });
        }

        // 确认选择
        function confirmSelection() {
            if (selectedPath.province && selectedPath.city && selectedPath.district) {
                document.getElementById('cityInput').value =
                    `${selectedPath.province.label} ${selectedPath.city.label} ${selectedPath.district.label}`;

                // 显示结果
                document.getElementById('provinceCode').textContent = selectedPath.province.value;
                document.getElementById('cityCode').textContent = selectedPath.city.value;
                document.getElementById('districtCode').textContent = selectedPath.district.value;
                document.getElementById('fullAddress').textContent =
                    `${selectedPath.province.label} ${selectedPath.city.label} ${selectedPath.district.label}`;
                document.getElementById('resultSection').style.display = 'block';

                if (cascaderOverlay) {
                    cascaderOverlay.classList.remove('show');
                }
            } else {
                alert('请完整选择省市区');
            }
        }
    </script>
</body>
</html>
