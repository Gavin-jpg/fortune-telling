<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API配置 - 测测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1525 0%, #2d2540 50%, #403555 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: #f0e6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(40, 30, 60, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(156, 127, 255, 0.2);
            border: 1px solid rgba(156, 127, 255, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8em;
            font-weight: 600;
            background: linear-gradient(135deg, #9c7fff, #b8a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(240, 230, 255, 0.7);
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95em;
            color: rgba(240, 230, 255, 0.9);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(156, 127, 255, 0.1);
            border: 1px solid rgba(156, 127, 255, 0.3);
            border-radius: 12px;
            color: #f0e6ff;
            font-size: 1em;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(240, 230, 255, 0.4);
        }

        .form-group input:focus {
            border-color: #9c7fff;
            box-shadow: 0 0 20px rgba(156, 127, 255, 0.3);
            background: rgba(156, 127, 255, 0.15);
        }

        .help-text {
            font-size: 0.85em;
            color: rgba(240, 230, 255, 0.6);
            margin-top: 8px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #9c7fff 0%, #8b70ff 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(156, 127, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(156, 127, 255, 0.5);
            color: rgba(240, 230, 255, 0.8);
        }

        .btn-secondary:hover {
            background: rgba(156, 127, 255, 0.1);
            border-color: #9c7fff;
            color: #f0e6ff;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9em;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #8bc34a;
        }

        .status.error {
            display: block;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ef5350;
        }

        .info-box {
            background: rgba(156, 127, 255, 0.1);
            border: 1px solid rgba(156, 127, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .info-box h4 {
            color: #9c7fff;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .info-box p {
            color: rgba(240, 230, 255, 0.7);
            font-size: 0.85em;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .info-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ API 配置</h1>
            <p>配置 SiliconFlow API Key 以启用 AI 分析功能</p>
        </div>

        <div class="form-group">
            <label for="apiKey">SiliconFlow API Key</label>
            <input type="password" id="apiKey" placeholder="请输入你的 SiliconFlow API Key">
            <p class="help-text">API Key 将保存在浏览器本地存储中,不会上传到服务器</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveApiKey()">保存配置</button>
            <button class="btn btn-secondary" onclick="testApi()">测试连接</button>
        </div>

        <div id="status" class="status"></div>

        <div class="info-box">
            <h4>📝 如何获取 API Key?</h4>
            <p>1. 访问 <a href="https://cloud.siliconflow.cn/" target="_blank" style="color: #9c7fff;">SiliconFlow 开放平台</a></p>
            <p>2. 注册/登录账号</p>
            <p>3. 进入「API Keys」管理页面创建密钥</p>
        </div>

        <div class="info-box">
            <h4>🔧 其他配置方式</h4>
            <p>也可以在浏览器控制台执行:</p>
            <p><code>localStorage.setItem('siliconflow_api_key', '你的密钥')</code></p>
        </div>
    </div>

    <script>
        // 页面加载时检查是否已有配置
        document.addEventListener('DOMContentLoaded', function() {
            // 兼容旧的 deepseek_api_key,同时支持新的 siliconflow_api_key
            let existingKey = localStorage.getItem('siliconflow_api_key');
            if (!existingKey) {
                existingKey = localStorage.getItem('deepseek_api_key');
            }

            if (existingKey) {
                document.getElementById('apiKey').value = existingKey;
                showStatus('已找到已保存的 API Key', 'success');
            }
        });

        function saveApiKey() {
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!apiKey) {
                showStatus('请输入 API Key', 'error');
                return;
            }

            // 同时保存到新旧两个键名,确保兼容性
            localStorage.setItem('siliconflow_api_key', apiKey);
            localStorage.setItem('deepseek_api_key', apiKey);
            showStatus('✓ API Key 保存成功!', 'success');

            // 3秒后跳转到主页
            setTimeout(() => {
                window.location.href = 'fortune-telling.html';
            }, 1500);
        }

        async function testApi() {
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!apiKey) {
                showStatus('请先输入 API Key', 'error');
                return;
            }

            showStatus('正在测试连接...', 'success');

            try {
                console.log('测试 SiliconFlow API Key:', apiKey.substring(0, 10) + '...');

                const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-ai/DeepSeek-V3',
                        messages: [
                            {
                                role: 'user',
                                content: '你好,这是一条测试消息'
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 10
                    })
                });

                console.log('API 响应状态:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    console.log('API 响应数据:', data);
                    showStatus('✓ API 连接测试成功!', 'success');
                    // 同时保存到新旧两个键名,确保兼容性
                    localStorage.setItem('siliconflow_api_key', apiKey);
                    localStorage.setItem('deepseek_api_key', apiKey);
                } else {
                    const errorText = await response.text();
                    console.error('API 错误:', errorText);
                    let errorMsg = `连接失败: ${response.statusText}`;

                    try {
                        const errorData = JSON.parse(errorText);
                        const errorMessage = errorData.error?.message || errorData.message;

                        // 特殊处理余额不足的情况
                        if (errorMessage && errorMessage.includes('Insufficient Balance')) {
                            errorMsg = '账户余额不足,请充值后重试';
                            showStatus(`✗ ${errorMsg}`, 'error');
                            console.warn('💰 提示: 您的 SiliconFlow 账户余额不足');
                            console.warn('请访问 https://cloud.siliconflow.cn/ 充值账户');
                            // 即使余额不足,也保存 API Key(因为 Key 是有效的)
                            localStorage.setItem('siliconflow_api_key', apiKey);
                        } else {
                            errorMsg = `连接失败: ${errorMessage || response.statusText}`;
                            showStatus(`✗ ${errorMsg}`, 'error');
                        }
                    } catch (e) {
                        console.log('无法解析错误响应');
                        showStatus(`✗ ${errorMsg}`, 'error');
                    }

                    // 根据错误代码给出具体建议
                    if (response.status === 401) {
                        showStatus('✗ API Key 无效或已过期,请检查', 'error');
                    } else if (response.status === 429) {
                        showStatus('✗ 请求频率过高,请稍后再试', 'error');
                    } else if (response.status === 500) {
                        showStatus('✗ 服务器错误,请稍后再试', 'error');
                    }
                }
            } catch (error) {
                console.error('测试连接失败:', error);
                showStatus(`✗ 连接失败: ${error.message}`, 'error');

                if (error.message.includes('fetch')) {
                    showStatus('✗ 网络错误,请检查网络连接', 'error');
                }
            }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
    </script>
</body>
</html>
